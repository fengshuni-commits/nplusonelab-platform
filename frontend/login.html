<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N+1 LAB - 登录系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #8c8c8c;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #262626;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fff1f0;
            border: 1px solid #ffa39e;
            color: #ff4d4f;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #8c8c8c;
            font-size: 12px;
        }
        
        .tips {
            background: #f0f5ff;
            border: 1px solid #d9d9d9;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 13px;
            color: #262626;
        }
        
        .tips strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🏢 N+1 LAB</h1>
            <p>企业资源管理系统</p>
        </div>
        
        <div class="error-message" id="error-msg">
            ❌ API Key 错误，请重新输入
        </div>
        
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">👤 用户名</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="请输入用户名"
                    autocomplete="off"
                    required
                    autofocus
                />
            </div>
            
            <div class="form-group">
                <label for="password">🔒 密码</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="请输入密码"
                    required
                />
            </div>
            
            <button type="submit" class="btn-login">
                登录系统
            </button>
        </form>
        
        <div class="tips">
            <strong>💡 默认账户：</strong><br>
            用户名：<code style="background: white; padding: 2px 6px; border-radius: 4px;">admin</code><br>
            密码：<code style="background: white; padding: 2px 6px; border-radius: 4px;">admin123</code>
        </div>
        
        <div class="footer">
            © 2026 N+1 LAB. All rights reserved.
        </div>
    </div>
    
    <script>
        // 后端 API 通过 Nginx /api/ 前缀代理到 8000 端口
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:8000' 
            : window.location.origin + '/api';
        
        // 检查是否已登录
        const savedUser = localStorage.getItem('n1_current_user');
        if (savedUser) {
            // 已登录，跳转到主页
            window.location.href = '/';
        }
        
        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }
            
            // 显示加载状态
            const btn = document.querySelector('.btn-login');
            btn.innerHTML = '登录中...';
            btn.disabled = true;
            
            try {
                // 调用后端 API 验证用户
                const response = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // 登录成功，保存用户信息
                    localStorage.setItem('n1_current_user', JSON.stringify({
                        id: result.user.id,
                        username: result.user.username,
                        role: result.user.role
                    }));
                    
                    // 跳转到主页
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    // 登录失败
                    showError(result.detail || '用户名或密码错误');
                    btn.innerHTML = '登录系统';
                    btn.disabled = false;
                }
            } catch (e) {
                console.error('登录失败:', e);
                showError('网络错误，请稍后重试');
                btn.innerHTML = '登录系统';
                btn.disabled = false;
            }
        }
        
        // 显示错误信息
        function showError(message) {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.textContent = '❌ ' + message;
            errorMsg.style.display = 'block';
            
            // 3 秒后自动隐藏
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
