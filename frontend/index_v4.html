<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N+1 LAB | 管理员后台 v4.0</title>
    <style>
        :root { --primary: #1890ff; --success: #52c41a; --warning: #fa8c16; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .nav { display: flex; gap: 20px; margin-bottom: 20px; }
        .nav-item { cursor: pointer; padding: 10px 20px; border-radius: 4px; }
        .nav-item.active { background: var(--primary); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #fafafa; }
        .btn { padding: 6px 12px; border-radius: 4px; border: 1px solid #d9d9d9; cursor: pointer; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .status { padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>N+1 LAB 自动化平台 <small style="font-size:14px; color:#999;">v4.0 串行采购版</small></h1>
            <div id="status-tag" class="status" style="background:#e6f7ff; color:#1890ff;">系统就绪</div>
        </div>

        <div class="nav">
            <div class="nav-item active">订单管理</div>
            <div class="nav-item" onclick="alert('模块开发中...')">产品中心</div>
            <div class="nav-item" onclick="alert('模块开发中...')">经销商管理</div>
        </div>

        <div id="order-list">
            <table>
                <thead>
                    <tr>
                        <th>订单ID</th>
                        <th>客户/经销商</th>
                        <th>产品详情</th>
                        <th>总额</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="orders-body">
                    <tr><td colspan="6" style="text-align:center;">正在加载订单数据...</td></tr>
</table>
            <div style="margin-top:20px; text-align:center;">
                <button class="btn btn-primary" onclick="startPurchaseFlow()">🛒 串行加购演示</button>
            </div>
        </div>
        
        <script>
        // 串行加购演示功能
        function startPurchaseFlow() {
            // 示例：模拟获取到采购清单
            const demoLinks = [
                'https://item.taobao.com/item.htm?id=638556465334&spm=a1z0d.6639537/tb.1997196601.48.1b667484kyX6Zl&skuId=4756230479655',
                'https://item.taobao.com/item.htm?id=another_part'
            ];
            
            // 发送给浏览器插件
            chrome.runtime.sendMessage({
                type: 'START_PURCHASE_QUEUE',
                links: demoLinks
            }, (response) => {
                if (chrome.runtime.lastError) {
                    alert('插件未安装或未启用，请检查Chrome扩展');
                } else {
                    alert('串行加购已启动，请查看浏览器插件状态');
                }
            });
        }
                </tbody>
            </table>
        </div>

        <!-- BOM 弹窗 (内容由 JS 填充) -->
        <div id="bom-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:600px; max-height:80vh; background:white; z-index:2000; padding:24px; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,0.15); overflow-y:auto;">
            <h3 id="bom-title" style="margin-bottom:16px;">物料清单 (BOM)</h3>
            
            <!-- 插件注入区域 -->
            <div id="plugin-anchor"></div>
            
            <table style="font-size:12px;">
                <thead><tr><th>名称</th><th>规格</th><th>数量</th></tr></thead>
                <tbody id="bom-body"></tbody>
            </table>
            <button onclick="document.getElementById('bom-modal').style.display='none'; document.getElementById('modal-mask').style.display='none'" class="btn btn-primary" style="width:100%; margin-top:20px;">关闭窗口</button>
        </div>
        <div id="modal-mask" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1999;"></div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        const key = 'n1lab2026';

        async function refresh() {
            try {
                const res = await fetch(`${API_BASE}/orders/`, { headers: { 'X-API-Key': key } });
                const orders = await res.json();
                const body = document.getElementById('orders-body');
                body.innerHTML = '';
                
                orders.forEach(o => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${o.id}</td>
                        <td>经销商 ID: ${o.dealer_id}</td>
                        <td>${o.product_name || '未知产品'}</td>
                        <td>¥${o.total_amount}</td>
                        <td><span class="status" style="background:#fff7e6; color:#fa8c16;">待处理</span></td>
                        <td>
                            <button class="btn btn-primary" onclick="showBOM(${o.items[0].product_id}, '${o.items[0].product_name}')">🔍 拆解 BOM</button>
                        </td>
                    `;
                    body.appendChild(tr);
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function showBOM(pid, name) {
            document.getElementById('bom-title').innerText = `物料清单: ${name}`;
            const body = document.getElementById('bom-body');
            body.innerHTML = '<tr><td colspan="3">正在查询物料...</td></tr>';
            
            document.getElementById('bom-modal').style.display = 'block';
            document.getElementById('modal-mask').style.display = 'block';

            try {
                const res = await fetch(`${API_BASE}/products/${pid}/bom`, { headers: { 'X-API-Key': key } });
                const bom = await res.json();
                body.innerHTML = '';
                bom.forEach(item => {
                    const tr = document.createElement('tr');
                    const link = item.link ? `<a href="${item.link}" target="_blank" style="color:#1890ff;text-decoration:none;">${item.part_name}</a>` : item.part_name;
                    tr.innerHTML = `
                        <td>${link}</td>
                        <td>${item.specs || '-'}</td>
                        <td>${item.quantity} 个</td>
                    `;
                    body.appendChild(tr);
                });
                
                // 给插件留一点反应时间
                window.dispatchEvent(new CustomEvent('N1_BOM_READY'));
            } catch (e) {
                body.innerHTML = '<tr><td colspan="3">获取 BOM 失败</td></tr>';
            }
        }

        refresh();
    </script>
</body>
</html>
